# Streamlit configuration used by both local runs and Streamlit Community Cloud.
# See https://docs.streamlit.io/library/advanced-features/configuration for all
# available options.

[theme]
base = "dark"
primaryColor = "#5ad1ff"
backgroundColor = "#0d1117"
secondaryBackgroundColor = "#161d29"
textColor = "#e1e7ef"
font = "sans serif"

[browser]
gatherUsageStats = false

[server]
# Streamlit Cloud sets these itself; values here are for local parity.
headless = true
